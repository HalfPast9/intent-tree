<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Intent Tree - Phase 1</title>
    <style>
      :root {
        --bg: #f4f6f8;
        --panel: #ffffff;
        --text: #1a202c;
        --muted: #5a6472;
        --accent: #0f766e;
        --danger: #b91c1c;
        --border: #d9e2ec;
        --warn: #92400e;
        --busy: #0b4a9e;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        color: var(--text);
        background: radial-gradient(circle at top right, #d9f5f3, var(--bg) 35%);
      }

      .layout {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        min-height: 100vh;
        padding: 12px;
      }

      .topbar {
        padding: 10px 12px 0;
      }

      .statusbar {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 10px 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
      }

      .activitybar {
        margin-top: 8px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 8px 10px;
      }

      .activity-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 6px;
      }

      .activity-list {
        max-height: 90px;
        overflow: auto;
        font-size: 0.85rem;
      }

      .activity-item {
        display: grid;
        grid-template-columns: 74px 1fr;
        gap: 8px;
        padding: 2px 0;
      }

      .activity-time {
        color: var(--muted);
        font-family: "IBM Plex Mono", "Consolas", monospace;
      }

      .activity-msg.ok {
        color: #166534;
      }

      .activity-msg.error {
        color: var(--danger);
      }

      .status-left {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: #2f855a;
      }

      .dot.busy {
        background: var(--busy);
        box-shadow: 0 0 0 0 rgba(11, 74, 158, 0.7);
        animation: pulse 1.4s infinite;
      }

      .dot.error {
        background: var(--danger);
      }

      @keyframes pulse {
        0% { box-shadow: 0 0 0 0 rgba(11, 74, 158, 0.7); }
        70% { box-shadow: 0 0 0 8px rgba(11, 74, 158, 0); }
        100% { box-shadow: 0 0 0 0 rgba(11, 74, 158, 0); }
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }

      .panel h2 {
        margin: 0;
        padding: 14px;
        border-bottom: 1px solid var(--border);
        font-size: 1rem;
      }

      #chatHistory {
        padding: 14px;
        overflow: auto;
        flex: 1;
      }

      .msg {
        margin-bottom: 10px;
        padding: 10px;
        border-radius: 8px;
      }

      .msg.user {
        background: #e6f4ff;
      }

      .msg.assistant {
        background: #eefbf8;
      }

      .msg.system {
        background: #edf2ff;
        border: 1px solid #dbe7ff;
        color: #274690;
      }

      .msg.assistant p {
        margin: 0 0 8px;
      }

      .msg.assistant p:last-child {
        margin-bottom: 0;
      }

      .msg.assistant h1,
      .msg.assistant h2,
      .msg.assistant h3,
      .msg.assistant h4,
      .msg.assistant h5,
      .msg.assistant h6 {
        margin: 0 0 8px;
        line-height: 1.3;
      }

      .msg.assistant ul,
      .msg.assistant ol {
        margin: 0 0 8px 18px;
        padding: 0;
      }

      .msg.assistant code {
        background: #dcf5ef;
        border-radius: 4px;
        padding: 1px 4px;
        font-family: "IBM Plex Mono", "Consolas", monospace;
      }

      .msg.assistant pre {
        margin: 0 0 8px;
        background: #102019;
        color: #d8fff2;
        border-radius: 8px;
        padding: 10px;
        overflow-x: auto;
      }

      .msg.assistant pre code {
        background: transparent;
        color: inherit;
        padding: 0;
      }

      .composer {
        border-top: 1px solid var(--border);
        padding: 10px;
        display: flex;
        gap: 8px;
      }

      .composer input {
        flex: 1;
        padding: 10px;
        border: 1px solid var(--border);
        border-radius: 8px;
      }

      button {
        border: 0;
        border-radius: 8px;
        background: var(--accent);
        color: white;
        padding: 10px 12px;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      .btn-ghost {
        background: transparent;
        color: var(--muted);
        border: 1px solid var(--border);
        padding: 4px 8px;
        font-size: 0.8rem;
      }

      #specFields {
        padding: 14px;
        overflow: auto;
      }

      .field {
        margin-bottom: 10px;
        padding-bottom: 10px;
        border-bottom: 1px solid var(--border);
      }

      .field label {
        display: block;
        font-weight: 600;
        margin-bottom: 4px;
      }

      .field .value {
        color: var(--muted);
        white-space: pre-wrap;
      }

      #conflicts {
        padding: 14px;
        border-top: 1px solid var(--border);
      }

      .conflict {
        border: 1px solid #fecaca;
        background: #fff1f2;
        padding: 10px;
        border-radius: 8px;
        margin-bottom: 8px;
      }

      .lock-row {
        border-top: 1px solid var(--border);
        padding: 10px 14px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      #status {
        color: var(--muted);
      }

      #busyHint {
        color: var(--warn);
        font-size: 0.9rem;
      }

      #phase2View {
        border-top: 1px solid var(--border);
        padding: 12px 14px;
        display: none;
        gap: 12px;
        flex-direction: column;
        overflow: auto;
      }

      .phase2-card {
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px;
        background: #fbfdfd;
      }

      .phase2-card h3 {
        margin: 0 0 8px;
      }

      .phase2-card textarea {
        width: 100%;
        min-height: 70px;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px;
        font-family: inherit;
        margin-bottom: 8px;
      }

      #stackEvolutionCard {
        display: none;
        border-color: #f3dcb2;
        background: #fffaf0;
      }

      .node-card {
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px;
        margin-bottom: 8px;
        background: #ffffff;
      }

      .node-title {
        font-weight: 600;
        margin-bottom: 4px;
      }

      .muted {
        color: var(--muted);
      }

      @media (max-width: 900px) {
        .layout {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      <div class="statusbar">
        <div class="status-left">
          <span id="statusDot" class="dot"></span>
          <strong id="statusTitle">Ready</strong>
        </div>
        <span id="statusDetail" class="muted">Idle</span>
      </div>
      <div class="activitybar">
        <div class="activity-head">
          <strong>Activity Log</strong>
          <button id="clearActivityBtn" class="btn-ghost">Clear</button>
        </div>
        <div id="activityList" class="activity-list"></div>
      </div>
    </div>

    <div class="layout">
      <section class="panel">
        <h2>Phase 1 Chat</h2>
        <div id="chatHistory"></div>
        <div class="composer">
          <input id="messageInput" placeholder="Describe the problem you need to solve..." />
          <button id="sendBtn">Send</button>
        </div>
      </section>

      <section class="panel">
        <h2>Problem Spec</h2>
        <div id="specFields"></div>
        <div id="conflicts"></div>
        <div class="lock-row">
          <span id="status">Phase 1 unlocked</span>
          <span id="busyHint"></span>
          <button id="lockBtn" style="display:none">Lock Phase 1</button>
        </div>
        <div id="phase2View">
          <div class="phase2-card">
            <h3>Phase 2 Status</h3>
            <div id="depthIndicator" class="muted">Waiting for Phase 1 lock...</div>
          </div>

          <div class="phase2-card">
            <h3>Abstraction Stack</h3>
            <textarea id="stackEditor" placeholder="Stack JSON array"></textarea>
            <button id="stackApproveBtn">Confirm Stack</button>
          </div>

          <div id="stackEvolutionCard" class="phase2-card">
            <h3>Stack Evolution Proposal</h3>
            <div id="stackEvolutionReasoning" class="muted" style="margin-bottom:8px"></div>
            <textarea id="stackEvolutionEditor" placeholder="Proposed evolved stack JSON array"></textarea>
            <button id="stackEvolutionApproveBtn">Approve Stack Evolution</button>
          </div>

          <div class="phase2-card">
            <h3>Layer Criteria</h3>
            <textarea id="criteriaEditor" placeholder="Criteria JSON"></textarea>
            <button id="criteriaApproveBtn">Approve Criteria</button>
          </div>

          <div class="phase2-card">
            <h3>Proposed Nodes</h3>
            <div id="nodesContainer"></div>
            <button id="nodesApproveBtn">Approve Nodes + Checklists</button>
          </div>
        </div>
      </section>
    </div>

    <script>
      const fields = [
        "problem_statement",
        "hard_constraints",
        "optimization_targets",
        "success_criteria",
        "out_of_scope",
        "assumptions",
        "nfrs",
        "existing_context"
      ];

      const fieldLabels = {
        problem_statement: "Problem statement",
        hard_constraints: "Hard constraints",
        optimization_targets: "Optimization targets",
        success_criteria: "Success criteria",
        out_of_scope: "Out of scope",
        assumptions: "Assumptions",
        nfrs: "NFRs",
        existing_context: "Existing context"
      };

      const state = {
        spec: null,
        clean: false,
        conflicts: []
      };

      const chatHistoryEl = document.getElementById("chatHistory");
      const messageInput = document.getElementById("messageInput");
      const sendBtn = document.getElementById("sendBtn");
      const specFieldsEl = document.getElementById("specFields");
      const conflictsEl = document.getElementById("conflicts");
      const lockBtn = document.getElementById("lockBtn");
      const statusEl = document.getElementById("status");
      const busyHintEl = document.getElementById("busyHint");
      const statusDot = document.getElementById("statusDot");
      const statusTitle = document.getElementById("statusTitle");
      const statusDetail = document.getElementById("statusDetail");
      const phase2View = document.getElementById("phase2View");
      const activityListEl = document.getElementById("activityList");
      const clearActivityBtn = document.getElementById("clearActivityBtn");
      const depthIndicator = document.getElementById("depthIndicator");
      const stackEditor = document.getElementById("stackEditor");
      const stackApproveBtn = document.getElementById("stackApproveBtn");
      const stackEvolutionCard = document.getElementById("stackEvolutionCard");
      const stackEvolutionReasoning = document.getElementById("stackEvolutionReasoning");
      const stackEvolutionEditor = document.getElementById("stackEvolutionEditor");
      const stackEvolutionApproveBtn = document.getElementById("stackEvolutionApproveBtn");
      const criteriaEditor = document.getElementById("criteriaEditor");
      const criteriaApproveBtn = document.getElementById("criteriaApproveBtn");
      const nodesContainer = document.getElementById("nodesContainer");
      const nodesApproveBtn = document.getElementById("nodesApproveBtn");

      const phase2State = {
        depth: 0,
        stack: null,
        stackEvolutionProposal: null,
        criteria: null,
        nodes: []
      };

      const uiState = {
        busy: false,
        busyTask: "",
        pendingAssistantIndicator: null,
        activityLog: []
      };

      function activityTime() {
        return new Date().toLocaleTimeString([], { hour12: false, minute: "2-digit", second: "2-digit" });
      }

      function renderActivity() {
        if (!uiState.activityLog.length) {
          activityListEl.innerHTML = '<div class="muted">No activity yet.</div>';
          return;
        }

        activityListEl.innerHTML = uiState.activityLog
          .map((entry) => `<div class="activity-item"><span class="activity-time">${entry.time}</span><span class="activity-msg ${entry.kind}">${escapeHtml(entry.message)}</span></div>`)
          .join("");
        activityListEl.scrollTop = activityListEl.scrollHeight;
      }

      function addActivity(message, kind = "info") {
        uiState.activityLog.push({ time: activityTime(), kind, message });
        if (uiState.activityLog.length > 60) {
          uiState.activityLog = uiState.activityLog.slice(uiState.activityLog.length - 60);
        }
        renderActivity();
      }

      async function apiFetch(url, options = {}, label = url) {
        const startedAt = performance.now();
        addActivity(`API start: ${label}`);
        const res = await fetch(url, options);
        const body = await res.json();
        const duration = Math.round(performance.now() - startedAt);

        if (res.ok) {
          addActivity(`API ok: ${label} (${duration}ms)`, "ok");
        } else {
          addActivity(`API error: ${label} (${duration}ms)`, "error");
        }

        return { res, body, duration };
      }

      function unwrapEnvelope(call, fallbackMessage) {
        const { res, body } = call;

        if (!res.ok || !body?.ok) {
          const errorMessage = body?.error?.message || fallbackMessage;
          throw new Error(errorMessage);
        }

        return {
          data: body.data || {},
          llm_raw: body.llm_raw || null
        };
      }

      function renderSpec() {
        if (!state.spec) return;

        specFieldsEl.innerHTML = fields
          .map((field) => {
            const value = state.spec[field] || "(empty)";
            return `<div class="field"><label>${fieldLabels[field]}</label><div class="value">${escapeHtml(value)}</div></div>`;
          })
          .join("");

        statusEl.textContent = state.spec.locked ? "Phase 1 locked" : "Phase 1 unlocked";
      }

      function renderConflicts() {
        if (!state.conflicts.length) {
          conflictsEl.innerHTML = "";
          return;
        }

        conflictsEl.innerHTML =
          `<h3 style="margin-top:0;color:var(--danger)">Conflicts</h3>` +
          state.conflicts
            .map(
              (conflict) =>
                `<div class="conflict"><strong>Tension:</strong> ${escapeHtml(conflict.tension)}<br/><strong>Clarifying question:</strong> ${escapeHtml(conflict.question)}</div>`
            )
            .join("");
      }

      function renderLock() {
        const visible = !state.spec?.locked && state.clean;
        lockBtn.style.display = visible ? "inline-block" : "none";
      }

      function setStatus(mode, title, detail) {
        statusTitle.textContent = title;
        statusDetail.textContent = detail;
        statusDot.classList.remove("busy", "error");

        if (mode === "busy") {
          statusDot.classList.add("busy");
        }

        if (mode === "error") {
          statusDot.classList.add("error");
        }
      }

      function setBusy(busy, task = "") {
        uiState.busy = busy;
        uiState.busyTask = task;

        sendBtn.disabled = busy;
        messageInput.disabled = busy || !!state.spec?.locked;
        lockBtn.disabled = busy;
        stackApproveBtn.disabled = busy;
        stackEvolutionApproveBtn.disabled = busy;
        criteriaApproveBtn.disabled = busy;
        nodesApproveBtn.disabled = busy;

        busyHintEl.textContent = busy ? `Working: ${task}` : "";

        if (busy) {
          setStatus("busy", "Working", task);
          addActivity(`Task started: ${task}`);
        } else {
          setStatus("ready", "Ready", state.spec?.locked ? "Phase 2 active" : "Phase 1 active");
          if (task) {
            addActivity(`Task completed: ${task}`, "ok");
          }
        }
      }

      function showAssistantThinking(task) {
        if (uiState.pendingAssistantIndicator) {
          return;
        }

        const div = document.createElement("div");
        div.className = "msg system";
        div.textContent = `LLM is working: ${task}`;
        chatHistoryEl.appendChild(div);
        chatHistoryEl.scrollTop = chatHistoryEl.scrollHeight;
        uiState.pendingAssistantIndicator = div;
      }

      function clearAssistantThinking() {
        if (!uiState.pendingAssistantIndicator) {
          return;
        }

        uiState.pendingAssistantIndicator.remove();
        uiState.pendingAssistantIndicator = null;
      }

      async function runTask(taskName, fn) {
        setBusy(true, taskName);
        showAssistantThinking(taskName);

        try {
          return await fn();
        } finally {
          clearAssistantThinking();
          setBusy(false);
        }
      }

      function appendMessage(role, content) {
        const div = document.createElement("div");
        div.className = `msg ${role}`;

        if (role === "assistant") {
          div.innerHTML = renderMarkdown(content);
        } else {
          div.textContent = content;
        }

        chatHistoryEl.appendChild(div);
        chatHistoryEl.scrollTop = chatHistoryEl.scrollHeight;
      }

      function setComposeEnabled(enabled) {
        sendBtn.disabled = !enabled;
        messageInput.disabled = !enabled;
      }

      function renderPhase2Nodes() {
        if (!phase2State.nodes.length) {
          nodesContainer.innerHTML = '<div class="muted">No proposed nodes yet.</div>';
          return;
        }

        nodesContainer.innerHTML = phase2State.nodes
          .map((node) => {
            const edges = node.edges
              .map((edge) => `<li>${escapeHtml(edge.direction)} to <code>${escapeHtml(edge.target)}</code> via ${escapeHtml(edge.interface)}</li>`)
              .join("");
            const checklist = node.checklist
              .map((item) => `<li><strong>${escapeHtml(item.item)}</strong>${item.context ? ` - ${escapeHtml(item.context)}` : ""}</li>`)
              .join("");

            return `
              <div class="node-card">
                <div class="node-title">${escapeHtml(node.id)} <span class="muted">(${escapeHtml(node.state)})</span></div>
                <div>${escapeHtml(node.intent)}</div>
                <div class="muted">Parents: ${escapeHtml((node.parents || []).join(", ") || "none")}</div>
                <div><strong>Edges</strong><ul>${edges || "<li>none</li>"}</ul></div>
                <div><strong>Checklist</strong><ul>${checklist || "<li>none</li>"}</ul></div>
              </div>
            `;
          })
          .join("");
      }

      function renderDepthIndicator() {
        const layers = phase2State.stack?.layers || [];
        const total = layers.length || 1;
        const current = phase2State.depth + 1;
        const layerName = phase2State.criteria?.layer_name || layers[phase2State.depth]?.layer || "Current Layer";
        depthIndicator.textContent = `Layer ${current} of ${total} - ${layerName}`;
      }

      function renderPhase2() {
        if (!state.spec?.locked) {
          phase2View.style.display = "none";
          return;
        }

        phase2View.style.display = "flex";
        stackEditor.value = JSON.stringify(phase2State.stack?.layers || [], null, 2);

        if (phase2State.stackEvolutionProposal) {
          stackEvolutionCard.style.display = "block";
          stackEvolutionReasoning.textContent = phase2State.stackEvolutionProposal.reasoning || "The model proposed a stack update for this layer.";
          stackEvolutionEditor.value = JSON.stringify(phase2State.stackEvolutionProposal.proposed_stack || [], null, 2);
        } else {
          stackEvolutionCard.style.display = "none";
          stackEvolutionReasoning.textContent = "";
          stackEvolutionEditor.value = "";
        }

        criteriaEditor.value = phase2State.criteria
          ? JSON.stringify(
              {
                layer_name: phase2State.criteria.layer_name,
                responsibility_scope: phase2State.criteria.responsibility_scope,
                considerations: phase2State.criteria.considerations,
                out_of_scope: phase2State.criteria.out_of_scope,
                checklist_template: JSON.parse(phase2State.criteria.checklist_template || "[]")
              },
              null,
              2
            )
          : "";
        renderDepthIndicator();
        renderPhase2Nodes();
      }

      async function loadPhase2() {
        if (!state.spec?.locked) {
          return;
        }

        await runTask("Loading Phase 2 stack", async () => {
          const stackCall = await apiFetch("/api/phase2/stack", {}, "phase2 stack");
          const { data: stackData } = unwrapEnvelope(stackCall, "Failed to load stack");

          if (!stackData.stack) {
            const proposeCall = await apiFetch("/api/phase2/stack/propose", { method: "POST" }, "phase2 stack propose");
            const proposed = unwrapEnvelope(proposeCall, "Failed to propose stack");
            phase2State.stack = proposed.data.stack;
            phase2State.depth = Number(proposed.data.session?.current_depth ?? 0);
          } else {
            phase2State.stack = stackData.stack;
            phase2State.depth = Number(stackData.session?.current_depth ?? 0);
          }

          const evolutionCall = await apiFetch(
            "/api/phase2/stack/evolution/check",
            {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ depth: phase2State.depth })
            },
            `phase2 stack check evolution depth ${phase2State.depth}`
          );
          const evolution = unwrapEnvelope(evolutionCall, "Failed to check stack evolution");
          phase2State.stackEvolutionProposal = evolution.data.stack_evolution_proposal || null;

          if (phase2State.stackEvolutionProposal) {
            phase2State.criteria = null;
            phase2State.nodes = [];
            renderPhase2();
            appendMessage("assistant", "Stack evolution needs your approval before we continue.");
            return;
          }

          setStatus("busy", "Working", "Generating/loading criteria document");
          const criteriaCall = await apiFetch(
            `/api/phase2/layer/${phase2State.depth}/criteria/generate`,
            { method: "POST" },
            `criteria depth ${phase2State.depth}`
          );
          const { data: criteriaData } = unwrapEnvelope(criteriaCall, "Failed to load criteria");

          phase2State.criteria = criteriaData.criteria;

          setStatus("busy", "Working", "Generating/loading nodes and checklists");
          const nodesCall = await apiFetch(
            `/api/phase2/layer/${phase2State.depth}/nodes/propose`,
            { method: "POST" },
            `nodes depth ${phase2State.depth}`
          );
          const { data: nodesData } = unwrapEnvelope(nodesCall, "Failed to load nodes");

          phase2State.nodes = Array.isArray(nodesData.nodes) ? nodesData.nodes : [];
          renderPhase2();
        });
      }

      async function loadSpec() {
        const call = await apiFetch("/api/phase1/spec", {}, "phase1 spec");
        const { data } = unwrapEnvelope(call, "Failed to load spec");

        state.spec = data.spec;
        renderSpec();

        if (fields.every((field) => String(state.spec[field] || "").trim())) {
          await runConflictCheck();
        }

        if (state.spec.locked) {
          setComposeEnabled(false);
          await loadPhase2();
        }
      }

      async function runConflictCheck() {
        const call = await apiFetch("/api/phase1/conflict-check", { method: "POST" }, "phase1 conflict check");
        const { data } = unwrapEnvelope(call, "Conflict check failed");

        state.spec = data.spec;
        state.clean = Boolean(data.clean);
        state.conflicts = Array.isArray(data.conflicts) ? data.conflicts : [];
        renderSpec();
        renderConflicts();
        renderLock();
      }

      sendBtn.addEventListener("click", async () => {
        const message = messageInput.value.trim();

        if (!message || uiState.busy) return;

        appendMessage("user", message);
        messageInput.value = "";

        try {
          await runTask("Prompt 1: analyzing your input", async () => {
            const call = await apiFetch("/api/phase1/message", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ message })
            }, "phase1 message");
            const { data } = unwrapEnvelope(call, "Request failed");

            appendMessage("assistant", data.message);
            state.spec = data.spec;
            state.clean = Boolean(data.clean);
            state.conflicts = Array.isArray(data.conflicts) ? data.conflicts : [];
            renderSpec();
            renderConflicts();
            renderLock();
          });
        } catch (error) {
          setStatus("error", "Error", "Request failed");
          appendMessage("assistant", error.message || "Request failed");
        }
      });

      messageInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          sendBtn.click();
        }
      });

      lockBtn.addEventListener("click", async () => {
        if (uiState.busy) return;

        try {
          await runTask("Locking Phase 1 and transitioning", async () => {
            const call = await apiFetch("/api/phase1/lock", { method: "POST" }, "phase1 lock");
            const { data } = unwrapEnvelope(call, "Could not lock Phase 1");

            state.spec = data.spec;
            renderSpec();
            renderLock();
            setComposeEnabled(false);
            appendMessage("assistant", "Phase 1 locked. Transitioned to phase2.");
            await loadPhase2();
          });
        } catch (error) {
          setStatus("error", "Error", "Could not lock Phase 1");
          appendMessage("assistant", error.message || "Could not lock Phase 1");
        }
      });

      stackApproveBtn.addEventListener("click", async () => {
        if (uiState.busy) return;

        try {
          const layers = JSON.parse(stackEditor.value || "[]");

          await runTask("Saving abstraction stack", async () => {
            const call = await apiFetch("/api/phase2/stack/approve", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ layers })
            }, "phase2 stack approve");
            const { data } = unwrapEnvelope(call, "Failed to approve stack");

            phase2State.stack = { ...data.stack, layers: data.layers };
            renderPhase2();
            appendMessage("assistant", "Abstraction stack approved.");
          });
        } catch (error) {
          setStatus("error", "Error", "Failed to approve stack");
          appendMessage("assistant", `Invalid stack JSON: ${error.message}`);
        }
      });

      stackEvolutionApproveBtn.addEventListener("click", async () => {
        if (uiState.busy) return;

        try {
          const proposed_stack = JSON.parse(stackEvolutionEditor.value || "[]");

          await runTask("Applying stack evolution", async () => {
            const call = await apiFetch("/api/phase2/stack/evolution/approve", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ depth: phase2State.depth, proposed_stack })
            }, "phase2 stack evolution approve");
            const { data } = unwrapEnvelope(call, "Failed to approve stack evolution");

            phase2State.stack = { ...data.stack, layers: data.layers };
            phase2State.stackEvolutionProposal = null;
            appendMessage("assistant", "Stack evolution approved.");
            await loadPhase2();
          });
        } catch (error) {
          setStatus("error", "Error", "Failed to approve stack evolution");
          appendMessage("assistant", `Invalid evolution stack JSON: ${error.message}`);
        }
      });

      criteriaApproveBtn.addEventListener("click", async () => {
        if (uiState.busy) return;

        try {
          const edits = JSON.parse(criteriaEditor.value || "{}");

          await runTask("Saving layer criteria", async () => {
            const call = await apiFetch(`/api/phase2/layer/${phase2State.depth}/criteria/approve`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(edits)
            }, `phase2 criteria approve depth ${phase2State.depth}`);
            const { data } = unwrapEnvelope(call, "Failed to approve criteria");

            phase2State.criteria = data.criteria;
            renderPhase2();
            appendMessage("assistant", "Layer criteria approved.");
          });
        } catch (error) {
          setStatus("error", "Error", "Failed to approve criteria");
          appendMessage("assistant", `Invalid criteria JSON: ${error.message}`);
        }
      });

      nodesApproveBtn.addEventListener("click", async () => {
        if (uiState.busy) return;

        try {
          await runTask("Approving nodes and checklists", async () => {
            const call = await apiFetch(`/api/phase2/layer/${phase2State.depth}/nodes/approve`, {
              method: "POST"
            }, `phase2 nodes approve depth ${phase2State.depth}`);
            unwrapEnvelope(call, "Failed to approve nodes");

            appendMessage("assistant", "Node proposals and checklists approved.");
          });
        } catch (error) {
          setStatus("error", "Error", "Failed to approve nodes");
          appendMessage("assistant", error.message || "Failed to approve nodes");
        }
      });

      function escapeHtml(value) {
        return value
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function renderInlineMarkdown(text) {
        return text
          .replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>')
          .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
          .replace(/\*([^*]+)\*/g, "<em>$1</em>")
          .replace(/`([^`]+)`/g, "<code>$1</code>");
      }

      function renderMarkdown(markdown) {
        const escaped = escapeHtml(String(markdown || "")).replaceAll("\r\n", "\n");
        const codeBlocks = [];

        const withoutCode = escaped.replace(/```([\s\S]*?)```/g, (_match, code) => {
          const token = `@@CODEBLOCK_${codeBlocks.length}@@`;
          codeBlocks.push(`<pre><code>${code.trim()}</code></pre>`);
          return token;
        });

        const lines = withoutCode.split("\n");
        const htmlParts = [];
        let inUl = false;
        let inOl = false;

        const closeLists = () => {
          if (inUl) {
            htmlParts.push("</ul>");
            inUl = false;
          }

          if (inOl) {
            htmlParts.push("</ol>");
            inOl = false;
          }
        };

        for (const rawLine of lines) {
          const line = rawLine.trim();

          if (!line) {
            closeLists();
            continue;
          }

          const codeTokenMatch = line.match(/^@@CODEBLOCK_(\d+)@@$/);

          if (codeTokenMatch) {
            closeLists();
            htmlParts.push(codeBlocks[Number(codeTokenMatch[1])] || "");
            continue;
          }

          const headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
          if (headingMatch) {
            closeLists();
            const level = headingMatch[1].length;
            htmlParts.push(`<h${level}>${renderInlineMarkdown(headingMatch[2])}</h${level}>`);
            continue;
          }

          const ulMatch = line.match(/^[-*]\s+(.*)$/);
          if (ulMatch) {
            if (inOl) {
              htmlParts.push("</ol>");
              inOl = false;
            }
            if (!inUl) {
              htmlParts.push("<ul>");
              inUl = true;
            }
            htmlParts.push(`<li>${renderInlineMarkdown(ulMatch[1])}</li>`);
            continue;
          }

          const olMatch = line.match(/^\d+\.\s+(.*)$/);
          if (olMatch) {
            if (inUl) {
              htmlParts.push("</ul>");
              inUl = false;
            }
            if (!inOl) {
              htmlParts.push("<ol>");
              inOl = true;
            }
            htmlParts.push(`<li>${renderInlineMarkdown(olMatch[1])}</li>`);
            continue;
          }

          closeLists();
          htmlParts.push(`<p>${renderInlineMarkdown(line)}</p>`);
        }

        closeLists();

        return htmlParts.join("") || "<p></p>";
      }

      loadSpec().catch((error) => {
        setStatus("error", "Error", "Initialization failed");
        addActivity(`Initialization failed: ${error.message}`, "error");
        appendMessage("assistant", `Failed to initialize UI: ${error.message}`);
      });

      clearActivityBtn.addEventListener("click", () => {
        uiState.activityLog = [];
        renderActivity();
      });

      renderActivity();
    </script>
  </body>
